spring.application.name=learning-boot

#server.port=8090 we can change port from here

spring.datasource.url=jdbc:h2:mem:aditya
spring.datasource.driverClassName=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#spring.jpa.defer.datasource-initialization=true  done so that data from file data.sql at resources dont try to insert itself before table intialization

